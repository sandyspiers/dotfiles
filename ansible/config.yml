---
# MINIMAL: Core CLI tools for a usable terminal environment
minimal:
  shared:
    # cli
    - bat
    - btop
    - curl
    - fastfetch
    - fd
    - fzf
    - openssh
    - ripgrep
    - zoxide

    # git tools
    - git
    - git-delta

    # tui
    - helix
    - yazi
    - zellij
    - lazygit

    # shells & prompts
    - fish
    - nushell
    - starship
  brew: []
  yay: []
  apt: []

# DEV: Development tools (includes minimal)
dev:
  shared:
    - juliaup
    - prettier
    - python
    - uv
    - visidata
  brew:
    - gh
  yay:
    - github-cli
    - podman
    - podman-compose
    - reflector
  apt:
    - podman
    - podman-compose

# FULL: Everything including latex and fonts (includes dev)
full:
  shared:
    - biber
    - texlab
  brew:
    - texlive
  yay:
    - texlive-meta
    - zathura
    - zathura-pdf-mupdf
    - ttf-ubuntu-font-family
    - ttf-jetbrains-mono-nerd
    - otf-libertinus
  apt:
    - zathura
    - zathura-pdf-poppler
    - fonts-ubuntu
    - fonts-jetbrains-mono
