---
# MINIMAL: Core CLI tools for a usable terminal environment
minimal:
  brew:
    # cli
    - bat
    - btop
    - curl
    - fastfetch
    - fd
    - fzf
    - openssh
    - ripgrep
    - zoxide

    # git tools
    - git
    - git-delta

    # tui
    - helix
    - yazi
    - zellij
    - lazygit

    # shells & prompts
    - fish
    - nushell
    - starship
  arch: []
  ubuntu: []

# DEV: Development tools (includes minimal)
dev:
  brew:
    - gh           # github-cli
    - juliaup
    - prettier
    - python
    - uv
  arch:
    - reflector    # arch-specific mirror manager, not in brew
  ubuntu: []

# FULL: Everything including latex and fonts (includes dev)
full:
  brew:
    - texlive      # texlive-meta on arch
    - biber
    - texlab
  arch:
    - zathura
    - zathura-pdf-mupdf
    - ttf-ubuntu-font-family
    - ttf-jetbrains-mono-nerd
    - otf-libertinus
  ubuntu:
    - zathura
    - zathura-pdf-poppler
    - fonts-ubuntu
    - fonts-jetbrains-mono
