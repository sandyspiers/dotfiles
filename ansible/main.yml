---
- name: Setting up dev environment
  hosts: "{{ target | default('localhost') }}"

  vars_files:
    - config.yml

  vars:
    install_minimal: "{{ level | default('minimal') in ['minimal', 'dev', 'full'] }}"
    install_dev: "{{ level | default('minimal') in ['dev', 'full'] }}"
    install_full: "{{ level | default('minimal') == 'full' }}"
    is_arch: "{{ ansible_facts['os_family'] == 'Archlinux' }}"
    is_ubuntu: "{{ ansible_facts['os_family'] == 'Debian' }}"
    brew_prefix: "/home/linuxbrew/.linuxbrew"
    brew_bin: "/home/linuxbrew/.linuxbrew/bin/brew"
    targets_path: "{{ (brew_prefix + '/bin:' + ansible_facts['env']['PATH']) if is_ubuntu else ansible_facts['env']['PATH'] }}"
    targets_julia_path: "{{ (brew_prefix + '/bin:' + ansible_facts['env']['HOME'] + '/.juliaup/bin:' + ansible_facts['env']['PATH']) if is_ubuntu else ansible_facts['env']['PATH'] }}"

  tasks:

    - name: "OS | Include Arch tasks"
      ansible.builtin.include_tasks: arch.yml
      when: is_arch
      tags: [always]

    - name: "OS | Include Brew (Ubuntu) tasks"
      ansible.builtin.include_tasks: brew.yml
      when: is_ubuntu
      tags: [always]

    # === CHEZMOI SETUP ===

    - name: "Chezmoi | Set chezmoi binary path"
      ansible.builtin.set_fact:
        chezmoi_bin: "{{ '/usr/bin/chezmoi' if is_arch else brew_prefix + '/bin/chezmoi' }}"
      tags: [always]

    - name: "Chezmoi | Init"
      ansible.builtin.command: "{{ chezmoi_bin }} init sandyspiers"
      args:
        creates: "~/.local/share/chezmoi/.git"
      tags: [minimal, dev, full]

    - name: "Chezmoi | Update and apply"
      ansible.builtin.command: "{{ chezmoi_bin }} update -k"
      tags: [minimal, dev, full]

    # === INSTALL SCRIPTS ===

    - name: "Install | Zellij plugins"
      ansible.builtin.command: ~/.config/zellij/install_plugins.sh
      tags: [minimal, dev, full]

    - name: "Install | Julia - add release channel"
      ansible.builtin.command: juliaup add release
      environment:
        PATH: "{{ targets_julia_path }}"
      when: install_dev
      tags: [dev, full]

    - name: "Install | Julia app - jetls"
      ansible.builtin.command: >
        julia -e 'using Pkg; Pkg.Apps.add(; url="https://github.com/aviatesk/JETLS.jl", rev="release")'
      environment:
        PATH: "{{ targets_julia_path }}"
      args:
        creates: "~/.julia/bin/jetls"
      when: install_dev
      tags: [dev, full]

    - name: "Install | Julia app - jlfmt"
      ansible.builtin.command: >
        julia -e 'using Pkg; Pkg.Apps.add("JuliaFormatter")'
      environment:
        PATH: "{{ targets_julia_path }}"
      args:
        creates: "~/.julia/bin/jlfmt"
      when: install_dev
      tags: [dev, full]

    - name: "Install | Julia app - runic"
      ansible.builtin.command: >
        julia -e 'using Pkg; Pkg.Apps.add("Runic")'
      environment:
        PATH: "{{ targets_julia_path }}"
      args:
        creates: "~/.julia/bin/runic"
      when: install_dev
      tags: [dev, full]


    # === DIRECTORIES ===

    - name: "Dirs | Create ~/files subdirectories"
      ansible.builtin.file:
        path: "~/files/{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - admin
        - forks
        - tools
        - work
        - scratch
      tags: [minimal, dev, full]
