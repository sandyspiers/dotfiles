# ============================================================
# General
# ============================================================

run-shell "tmux set -g default-shell $(which nu)"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g status-position bottom

# True color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Allow passthrough for yazi preview
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# ============================================================
# Leader
# ============================================================

unbind C-b
set -g prefix M-g
bind M-g send-prefix

# ============================================================
# No-leader bindings
# ============================================================

# Pane navigation
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Window (tab) navigation
bind -n M-i previous-window
bind -n M-o next-window

# Move windows
bind -n M-I swap-window -t -1\; select-window -t -1
bind -n M-O swap-window -t +1\; select-window -t +1

# Cycle layouts
bind -n M-n next-layout

# Floating tools
bind -n M-f display-popup -E -d "#{pane_current_path}" -w 80% -h 80%
bind -n M-b display-popup -E -d "#{pane_current_path}" -w 90% -h 90% "btop"
# bind -n M-y display-popup -E -d "#{pane_current_path}" -w 90% -h 90% "yazi"
bind -n M-t display-popup -E -d "#{pane_current_path}" -w 90% -h 90% "fzf-tail"
bind -n M-c display-popup -E -d "#{pane_current_path}" -w 90% -h 90% "lazygit"

# ============================================================
# Prefix bindings
# ============================================================

# Panes
bind n split-window -h -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"
bind x kill-pane
bind F resize-pane -Z
bind b break-pane
bind [ join-pane -t :-1
bind ] join-pane -t :+1

# Windows
bind N new-window -c "#{pane_current_path}"
bind X kill-window
bind r command-prompt "rename-window '%%'"

# Resize (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Session / scroll / misc
bind s choose-session
bind d detach-client
bind q confirm-before -p "Kill server? (y/n)" kill-server
bind v copy-mode

# Window selection by number
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

# ============================================================
# Copy mode (vi keys)
# ============================================================

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ============================================================
# TPM + Dracula
# ============================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'dracula/tmux'

set -g @dracula-show-left-icon "#S"
set -g @dracula-show-ssh-only-when-connected true
set -g @dracula-show-ssh-session-port false
set -g @dracula-time-format "%I:%M%p"
set -g @dracula-plugins "git time ssh-session"

run '~/.tmux/plugins/tpm/tpm'
